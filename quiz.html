<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: O Maestro, o Cozinheiro e a Estrada</title>
    <link rel="stylesheet" href="quiz-style.css">
</head>
<body>

    <div id="quiz-container">
        <div id="quiz-start-screen">
            <h2 style="color: #38bdf8; font-size: 2rem;">Desafio Teórico</h2>
            <p style="color: #94a3b8; margin-bottom: 30px;">Responda as 15 perguntas para gerar seu diagnóstico de sistema.</p>
            <button id="btn-quiz-start">Quantificador_QI</button>
        </div>

        <div id="quiz-content" style="display: none;">
            <header>
                <h1>Teste de Conhecimento</h1>
                <div id="progress">Pergunta 1 de 15</div>
            </header>

            <div id="question-box">
                <p id="question-text">Preparando hardware...</p>
                <div id="options-container">
                    </div>
            </div>

            <div id="quiz-footer">
                <div id="quiz-feedback"></div>
                <button id="next-btn" style="display: none;">Próxima Pergunta</button>
            </div>
        </div>
    </div>

    <script src="quiz-script.js"></script>
</body>
</html>
